$kind: http-request
name: 'Create Ticket'
method: POST
url: '{{api_base_url}}/tickets'
order: 2000
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
body:
  type: json
  content: |-
    {
      "title": "Printer issue",
      "description": "Office printer is jammed",
      "status": "open",
      "priority": "high",
      "created_by": 1,
      "assigned_to": 2,
      "category_id": 1
    }
