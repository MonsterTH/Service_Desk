$kind: http-request
name: 'Patch Category'
method: PATCH
url: '{{api_base_url}}/categories/{{category_id}}'
order: 5000
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
body:
  type: json
  content: |-
    {
      "name": "Hardware",
      "is_active": true
    }
