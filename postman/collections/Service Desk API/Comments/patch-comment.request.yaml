$kind: http-request
name: 'Patch Comment'
method: PATCH
url: '{{api_base_url}}/comments/{{comment_id}}'
order: 5000
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
body:
  type: json
  content: |-
    {
      "comment": "Status updated",
      "is_internal": true
    }
