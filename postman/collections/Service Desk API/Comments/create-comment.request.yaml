$kind: http-request
name: 'Create Comment'
method: POST
url: '{{api_base_url}}/comments'
order: 2000
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
body:
  type: json
  content: |-
    {
      "ticket_id": 1,
      "user_id": 1,
      "comment": "Investigating the issue",
      "is_internal": false
    }
